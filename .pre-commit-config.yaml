repos:
-   repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
    -   id: black
-   repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
    -   id: flake8
        additional_dependencies: [flake8-bugbear]
        args: ["--max-line-length=88", "--extend-ignore=E203,W503", "--exclude=venv/.venv,env,__pycache__,migrations"]
