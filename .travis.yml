language: python

python:
  - "3.12"

services:
  - postgresql

env:
  global:
    - DJANGO_SETTINGS_MODULE=duesanddos.settings
    - PGHOST=127.0.0.1
    - PGPORT=5432
    - PGUSER=postgres
    - PGPASSWORD=
    - PGDATABASE=travis_ci_test

install:
  - pip install -r duesanddos/requirements.txt
  - pip install coverage 'coveralls[yaml]' flake8 black

before_script:
  # ---- DEBUG: basic system info ----
  - echo "===== SYSTEM INFO ====="
  - python --version
  - pip --version
  - uname -a

  # ---- DEBUG: environment variables (masked safely) ----
  - echo "===== ENV VARS (SAFE PRINT) ====="
  - printenv | sort | sed -E 's/(AWS|SECRET|PASSWORD|KEY|TOKEN)=.*/\1=***MASKED***/g'

  # ---- DEBUG: postgres connectivity ----
  - echo "===== POSTGRES CHECK ====="
  - psql --version
  - pg_isready -h 127.0.0.1 -p 5432

  # ---- CREATE DB ----
  - psql -h 127.0.0.1 -U postgres -d postgres -c 'CREATE DATABASE travis_ci_test;'

  # ---- DEBUG: verify DB exists ----
  - psql -h 127.0.0.1 -U postgres -l

  # ---- MOVE INTO PROJECT ----
  - cd duesanddos

  # ---- DEBUG: Django env visibility ----
  - echo "===== DJANGO ENV CHECK ====="
  - python - <<EOF
import os
print("DJANGO_SETTINGS_MODULE =", os.getenv("DJANGO_SETTINGS_MODULE"))
print("PGHOST =", os.getenv("PGHOST"))
print("PGDATABASE =", os.getenv("PGDATABASE"))
EOF

script:
  - echo "===== RUNNING FORMAT/LINT ====="
  - black --check .
  - flake8 .

  - echo "===== RUNNING TESTS ====="
  - coverage run manage.py test -v 2

after_success:
  - coveralls --verbose

deploy:
  - provider: elasticbeanstalk
    access_key_id: "$AWS_ACCESS_KEY_ID"
    secret_access_key: "$AWS_SECRET_ACCESS_KEY"
    region: "$AWS_S3_REGION_NAME"
    app: "$AWS_APP"
    env: "$AWS_ENV_DEVELOP"
    bucket: "$AWS_DEPLOYMENT_BUCKET"
    edge: true
    on:
      branch: develop
      python: "3.12"

  - provider: elasticbeanstalk
    access_key_id: "$AWS_ACCESS_KEY_ID"
    secret_access_key: "$AWS_SECRET_ACCESS_KEY"
    region: "$AWS_S3_REGION_NAME"
    app: "$AWS_APP"
    env: "$AWS_ENV_MAIN"
    bucket: "$AWS_DEPLOYMENT_BUCKET"
    edge: true
    on:
      branch: main
      python: "3.12"
