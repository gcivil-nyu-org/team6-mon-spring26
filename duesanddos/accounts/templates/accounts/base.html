{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dues & Do's{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 
                            500: '#051f52', 600: '#051f52', 700: '#051f52', 800: '#051f52', 900: '#051f52', 950: '#051f52'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .nav-item-active { background-color: #f0fdf4; color: #166534; }
        .brand-text-gradient {
            background: linear-gradient(to right, #051f52, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full transition-all duration-300">
            <div class="p-6">
                <a href="{% url 'home' %}" class="flex items-center gap-3">
                    <img src="{% static 'images/logo.png' %}" alt="Dues & Do's" class="h-8 w-auto">
                    <span class="text-lg font-bold brand-text-gradient">Dues & Do's</span>
                </a>
            </div>

            <nav class="flex-1 px-4 space-y-1">
                <a href="{% url 'dashboard' %}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-colors {% if request.resolver_match.url_name == 'dashboard' %}bg-blue-50 text-brand-500{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
                    Dashboard
                </a>
                <button onclick="showComingSoon('Expenses')" class="w-full flex items-center px-4 py-3 text-sm font-medium text-gray-400 cursor-not-allowed rounded-xl hover:bg-gray-50 transition-colors">
                    Expenses
                </button>
                <button onclick="showComingSoon('Chores')" class="w-full flex items-center px-4 py-3 text-sm font-medium text-gray-400 cursor-not-allowed rounded-xl hover:bg-gray-50 transition-colors">
                    Chores
                </button>
                <a href="{% url 'profile' %}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-colors {% if 'profile' in request.resolver_match.url_name %}bg-blue-50 text-brand-500{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
                    Profile
                </a>
            </nav>

            <div class="p-4 border-t border-gray-100">
                <div class="relative group">
                    <button onclick="toggleLogout()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 transition-colors text-left">
                        <div class="h-10 w-10 rounded-full bg-brand-500 flex items-center justify-center text-white font-bold">
                            {{ user.username|first|upper }}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-semibold text-gray-900 truncate">{{ user.username }}</p>
                            <p class="text-xs text-gray-500 truncate">{{ user.email }}</p>
                        </div>
                    </button>
                    
                    <div id="logoutBox" class="hidden absolute bottom-full left-0 w-full mb-2 bg-white border border-gray-200 rounded-xl shadow-lg py-2 z-50">
                        <form method="POST" action="{% url 'logout' %}" class="px-2">
                            {% csrf_token %}
                            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg font-medium transition-colors">
                                Sign out
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64 p-8">
            <div class="max-w-5xl mx-auto">
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-6 p-4 rounded-xl {% if message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        function showComingSoon(feature) {
            alert(feature + ' feature is coming soon!');
        }
        
        function toggleLogout() {
            const box = document.getElementById('logoutBox');
            box.classList.toggle('hidden');
        }
        
        // Close logout box when clicking outside
        document.addEventListener('click', function(event) {
            const logoutBox = document.getElementById('logoutBox');
            const toggleBtn = logoutBox.previousElementSibling;
            if (!logoutBox.contains(event.target) && !toggleBtn.contains(event.target)) {
                logoutBox.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
