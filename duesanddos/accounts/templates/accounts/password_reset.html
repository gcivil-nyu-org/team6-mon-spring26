{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Dues & Do's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 
                            500: '#051f52', 600: '#051f52', 700: '#051f52', 800: '#051f52', 900: '#051f52', 950: '#051f52'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .input-field {
            width: 100%; padding: 0.875rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0;
            transition: all 0.3s ease; font-size: 0.875rem; background-color: #f8fafc; color: #1e293b;
        }
        .input-field:focus {
            outline: none; border-color: #051f52; box-shadow: 0 0 0 4px rgba(5, 31, 82, 0.05); background-color: #fff;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="{% url 'home' %}" class="inline-flex items-center gap-2">
                <img src="{% static 'images/logo.png' %}" alt="Logo" class="h-10 w-10">
                <span class="text-2xl font-black text-gray-900 tracking-tight">Dues <span class="text-brand-400">&</span> Do's</span>
            </a>
        </div>

        <!-- Main Card -->
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-gray-200/50 border border-gray-100">
            <div class="mb-8">
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Reset Password</h1>
                <p class="text-gray-500 mt-2 font-medium">Enter your email and we'll send you a link to reset your account.</p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label for="id_email" class="text-[0.7rem] font-black text-gray-400 uppercase tracking-widest pl-1">Email Address</label>
                    <input type="email" name="email" id="id_email" class="input-field" placeholder="your@email.com" required autofocus>
                    {% if form.email.errors %}
                        {% for error in form.email.errors %}
                            <p class="text-red-500 text-xs font-bold mt-1 pl-1">{{ error }}</p>
                        {% endfor %}
                    {% endif %}
                </div>

                <button type="submit" class="w-full py-4 bg-brand-500 text-white rounded-2xl text-sm font-black hover:bg-brand-600 transition-all shadow-lg shadow-brand-500/20 active:scale-[0.98]">
                    Send Reset Link
                </button>

                <div class="pt-2 text-center">
                    <a href="{% url 'login' %}" class="text-sm font-bold text-gray-400 hover:text-brand-500 transition-colors">
                        &larr; Back to Log in
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
