{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | Dues & Do's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 
                            500: '#051f52', 600: '#051f52', 700: '#051f52', 800: '#051f52', 900: '#051f52', 950: '#051f52'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2">
                <img src="{% static 'images/logo.png' %}" alt="Logo" class="h-10 w-10">
                <span class="text-2xl font-black text-gray-900 tracking-tight">Dues <span class="text-brand-400">&</span> Do's</span>
            </div>
        </div>

        <!-- Main Card -->
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-gray-200/50 border border-gray-100 text-center">
            <div class="w-20 h-20 bg-brand-50 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-inner">
                <svg class="w-10 h-10 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Check Your Email</h1>
            <p class="text-gray-500 mt-4 font-medium leading-relaxed">
                We've sent a recovery link to your inbox. Please follow the instructions to reset your password.
            </p>

            <div class="mt-10 py-6 border-t border-gray-50">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Didn't receive anything?</p>
                <a href="{% url 'password_reset' %}" class="text-sm font-black text-brand-500 hover:text-brand-600 underline underline-offset-4 decoration-2">
                    Resend link
                </a>
            </div>

            <div class="mt-8">
                <a href="{% url 'login' %}" class="inline-flex items-center px-8 py-3 bg-gray-950 text-white rounded-xl text-sm font-bold transition-all hover:bg-gray-800 active:scale-95 shadow-lg shadow-gray-950/20">
                    Back to Log in
                </a>
            </div>
        </div>
    </div>
</body>
</html>
