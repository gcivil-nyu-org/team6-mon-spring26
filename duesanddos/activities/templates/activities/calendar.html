{% extends "accounts/base.html" %}
{% block content %}
<div class="px-4 sm:px-6 lg:px-8 py-10 w-full mx-auto space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Household Schedule</h1>
            <p class="text-gray-500 mt-1">Track chore completions and upcoming tasks for all roommates.</p>
        </div>

        <div class="flex items-center gap-4 bg-white p-2 px-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300">
            <div class="flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-blue-500"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <label for="memberFilter" class="text-[10px] font-black text-gray-400 uppercase tracking-widest whitespace-nowrap">Filter Roommate</label>
            </div>
            <div class="relative group">
                <select id="memberFilter" class="appearance-none bg-gray-50 border-none text-sm font-bold text-gray-700 py-2 pl-3 pr-10 rounded-xl cursor-pointer focus:ring-2 focus:ring-blue-100 transition-all w-full md:w-[220px]">
                    <option value="">All Roommates</option>
                    {% for member in members %}
                    <option value="{{ member.user.id }}">
                        {{ member.user.get_full_name|default:member.user.username }} ({{ member.user.username }})
                    </option>
                    {% endfor %}
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-gray-400 group-hover:text-blue-500 transition-colors">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"></path></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Legend -->
    <div class="bg-white p-6 rounded-[1.5rem] border border-gray-100 shadow-sm flex flex-wrap items-center gap-x-8 gap-y-4">
        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest w-full md:w-auto">Status Legend:</span>
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full" style="background-color: #10b981;"></span>
            <span class="text-sm font-bold text-gray-600">On Time</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full" style="background-color: #f59e0b;"></span>
            <span class="text-sm font-bold text-gray-600">Late</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full" style="background-color: #ef4444;"></span>
            <span class="text-sm font-bold text-gray-600">Overdue / Not Done</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full" style="background-color: #3b82f6;"></span>
            <span class="text-sm font-bold text-gray-600">Pending</span>
        </div>
    </div>

    <div class="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-xl shadow-gray-200/40 relative overflow-hidden">
        <div id="calendar"></div>
    </div>
</div>

<style>
    /* FullCalendar Premium Overhaul */
    :root {
        --fc-border-color: #f1f5f9;
        --fc-daygrid-event-dot-width: 8px;
        --fc-today-bg-color: #eff6ff;
    }

    #calendar {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        border: none !important;
    }

    /* Toolbar Styling */
    .fc .fc-toolbar {
        margin-bottom: 2rem !important;
    }

    .fc .fc-toolbar-title {
        font-size: 1.5rem !important;
        font-weight: 800 !important;
        color: #1e293b !important;
        letter-spacing: -0.025em;
    }

    .fc .fc-button-primary {
        background-color: #ffffff !important;
        border: 1px solid #e2e8f0 !important;
        color: #64748b !important;
        font-weight: 700 !important;
        font-size: 0.85rem !important;
        text-transform: capitalize !important;
        padding: 8px 16px !important;
        border-radius: 12px !important;
        transition: all 0.2s ease !important;
        box-shadow: none !important;
    }

    .fc .fc-button-primary:hover {
        background-color: #f8fafc !important;
        color: #0f172a !important;
        border-color: #cbd5e1 !important;
    }

    .fc .fc-button-active {
        background-color: #0a317d !important;
        border-color: #0a317d !important;
        color: #ffffff !important;
    }

    .fc .fc-button-primary:not(:disabled):active {
        background-color: #0a317d !important;
        border-color: #0a317d !important;
    }

    /* Today Button specific - make it stand out */
    .fc .fc-today-button {
        background-color: #eff6ff !important;
        color: #2563eb !important;
        border-color: #bfdbfe !important;
    }

    .fc .fc-today-button:disabled {
        display: none !important;
    }

    /* Day Header Styling */
    .fc .fc-col-header-cell {
        padding: 12px 0 !important;
        background-color: #f8fafc !important;
        border: none !important;
    }

    .fc .fc-col-header-cell-cushion {
        font-size: 0.75rem !important;
        font-weight: 800 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.05em !important;
        color: #94a3b8 !important;
        text-decoration: none !important;
    }

    /* Grid Styling */
    .fc-theme-standard td, .fc-theme-standard th {
        border-color: #f1f5f9 !important;
    }

    .fc .fc-daygrid-day-top {
        flex-direction: row !important;
        padding: 8px !important;
    }

    .fc .fc-daygrid-day-number {
        font-weight: 700 !important;
        color: #64748b !important;
        font-size: 0.9rem !important;
        text-decoration: none !important;
        padding: 4px 8px !important;
        border-radius: 6px !important;
    }

    /* Today Highlight */
    .fc .fc-day-today {
        background-color: #f0f7ff !important;
    }

    .fc .fc-day-today .fc-daygrid-day-number {
        background-color: #2563eb !important;
        color: #ffffff !important;
        box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2) !important;
    }

    /* Event Styling */
    .fc-v-event, .fc-h-event {
        border: none !important;
        padding: 2px !important;
        border-radius: 8px !important;
        margin-top: 1px !important;
        margin-bottom: 1px !important;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05) !important;
    }

    .fc-event-main {
        padding: 2px 4px !important;
    }

    /* More Events (+n more) */
    .fc-daygrid-more-link {
        font-size: 0.75rem !important;
        font-weight: 800 !important;
        color: #2563eb !important;
        text-decoration: none !important;
        padding-left: 8px !important;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .fc .fc-toolbar {
            flex-direction: column !important;
            gap: 1rem !important;
        }
        .fc .fc-toolbar-title {
            font-size: 1.25rem !important;
        }
    }
</style>

<!-- Custom Calendar Event Modal -->
<div id="calendarModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm animate-in fade-in duration-200" onclick="if(event.target === this) closeCalendarModal()">
    <div class="bg-white rounded-[2rem] shadow-2xl border border-gray-100 w-full max-w-md p-8 transform transition-all animate-in zoom-in-95 duration-200">
        <div class="flex justify-between items-start mb-6">
            <div class="flex items-center gap-3">
                <div id="modalHeaderColor" class="w-2 h-8 rounded-full bg-blue-600"></div>
                <h3 class="text-xl font-black text-gray-900 tracking-tight">Chore Details</h3>
            </div>
            <button onclick="closeCalendarModal()" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1">Activity</label>
                <div id="modalDescription" class="text-lg font-bold text-gray-900 leading-tight"></div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1">Assignees</label>
                    <div id="modalAssignees" class="text-sm font-bold text-gray-600"></div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1">Current Status</label>
                    <div id="modalStatusContainer">
                        <span id="modalStatus" class="inline-flex items-center rounded-md px-2 py-1 text-xs font-bold ring-1 ring-inset"></span>
                    </div>
                </div>
            </div>

            <div id="modalCompletedByRow" class="hidden bg-green-50 p-4 rounded-2xl border border-green-100">
                <label class="text-[10px] font-black text-green-600 uppercase tracking-widest block mb-1">Completed By</label>
                <div id="modalCompletedBy" class="text-sm font-black text-green-700"></div>
            </div>
        </div>

        <div class="mt-8">
            <button onclick="closeCalendarModal()" class="btn-primary w-full py-4 text-sm font-black shadow-lg shadow-blue-200" style="margin-top: 0;">
                Close Details
            </button>
        </div>
    </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      height: 'auto',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      buttonText: {
          today: 'Go to Today',
          month: 'Month',
          week: 'Week',
          day: 'Day'
      },
      dayMaxEvents: 3,
      events: '/activities/api/calendar-events/',
      eventDisplay: 'block',
      eventTimeFormat: {
        hour: 'numeric',
        minute: '2-digit',
        meridiem: 'short'
      },
      eventContent: function(arg) {
        let title = arg.event.title;
        const isDone = title.includes('(Done');
        const isOverdue = title.includes('(Overdue)');
        
        // Strip out the (Done by...) part for the main text but keep it as a subtitle
        const pureTitle = title.split(' (')[0];
        
        return {
          html: `
            <div class="flex flex-col gap-0.5 px-2 py-0.5" title="${title}">
              <div class="text-[10px] font-black leading-tight truncate uppercase tracking-tight">${pureTitle}</div>
              ${isDone ? '<div class="text-[8px] opacity-90 font-bold italic truncate">Completed</div>' : ''}
              ${isOverdue ? '<div class="text-[8px] opacity-95 font-black truncate">PAST DUE</div>' : ''}
            </div>
          `
        };
      },
      // Custom modal on click
      eventClick: function(info) {
          const props = info.event.extendedProps;
          const color = info.event.backgroundColor;
          const title = info.event.title;
          
          // Pure title (strip status in parens if any)
          const pureTitle = title.split(' (')[0];
          
          document.getElementById('modalDescription').innerText = pureTitle;
          document.getElementById('modalAssignees').innerText = props.assignees || 'Unassigned';
          
          const statusEl = document.getElementById('modalStatus');
          statusEl.innerText = props.status;
          
          // Reset and apply status styles
          statusEl.className = 'inline-flex items-center rounded-md px-2 py-1 text-xs font-bold ring-1 ring-inset';
          if (color === '#10b981') { // Green
              statusEl.classList.add('bg-green-50', 'text-green-700', 'ring-green-600/20');
          } else if (color === '#f59e0b') { // Yellow
              statusEl.classList.add('bg-yellow-50', 'text-yellow-700', 'ring-yellow-600/20');
          } else if (color === '#ef4444') { // Red
              statusEl.classList.add('bg-red-50', 'text-red-700', 'ring-red-600/20');
          } else { // Blue
              statusEl.classList.add('bg-blue-50', 'text-blue-700', 'ring-blue-600/20');
          }

          document.getElementById('modalHeaderColor').style.backgroundColor = color;
          
          const completedRow = document.getElementById('modalCompletedByRow');
          if (props.completed_by) {
              completedRow.classList.remove('hidden');
              document.getElementById('modalCompletedBy').innerText = props.completed_by;
          } else {
              completedRow.classList.add('hidden');
          }
          
          document.getElementById('calendarModal').classList.remove('hidden');
      }
    });

    window.closeCalendarModal = function() {
        document.getElementById('calendarModal').classList.add('hidden');
    }
    calendar.render();

    document.getElementById('memberFilter').addEventListener('change', function() {
        calendar.setOption('events', '/activities/api/calendar-events/?user_id=' + this.value);
    });
  });
</script>
{% endblock %}
